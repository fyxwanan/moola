<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE054" />
      <stop offset="100%" stop-color="#F5B000" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.15" />
    </filter>
  </defs>
  <!-- Coin Background -->
  <circle cx="24" cy="24" r="22" fill="url(#gold)" filter="url(#shadow)" />
  <!-- Inner border -->
  <circle cx="24" cy="24" r="19" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.4" stroke-dasharray="3,2" />
  <!-- Shark Fin (ShaYu) -->
  <path d="M 14,35 C 15,23 23,13 35,13 C 27,21 25,28 32,35 Z" fill="#222222" />
  <!-- Water Ripple under the fin -->
  <path d="M 12,35 Q 24,38 36,35" fill="none" stroke="#222222" stroke-width="2.5" stroke-linecap="round" />
</svg>